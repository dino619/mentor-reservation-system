services:
  postgres:
    image: postgres:16-alpine
    container_name: mentor-reservation-postgres
    environment:
      POSTGRES_DB: mentor_reservation
      POSTGRES_USER: mentor_app
      POSTGRES_PASSWORD: mentor_app_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor_app -d mentor_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
